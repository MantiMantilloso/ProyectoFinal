# Manhattan S.O.S.: backend FastAPI + frontend nginx
#
# Uso:
#   docker compose up --build
#   -> http://localhost:8080   (frontend)
#   -> http://localhost:8080/api/accidents  (proxy a uvicorn)
#
# api expone 8000 solo en la red interna ('api:8000'); el unico puerto
# publicado es el de nginx.

services:
  api:
    build:
      context: .
      dockerfile: manhattan_sos/Dockerfile.api
    image: manhattan-sos-api:latest
    container_name: manhattan-sos-api
    restart: unless-stopped
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8000/api/accidents', timeout=3); print('ok')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: ./manhattan_sos
      dockerfile: Dockerfile.web
    image: manhattan-sos-web:latest
    container_name: manhattan-sos-web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
